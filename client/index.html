<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;500;600;700;800&family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>Rotaract Strength Analyzer | District EOI</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Prefetch form data before React loads
      window.__PREFETCH__ = {};
      var API = 'https://rotaract3234strengthanalyser-backend.blackitechs.org/api';
      function pf(name, url) {
        return fetch(url).then(function(r) { return r.json(); }).then(function(d) { window.__PREFETCH__[name] = d; }).catch(function() {});
      }
      Promise.all([
        pf('questions', API + '/application/questions'),
        pf('positions', API + '/application/positions'),
        pf('clubs', API + '/application/clubs')
      ]).then(function() { window.__PREFETCH_DONE__ = true; });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
