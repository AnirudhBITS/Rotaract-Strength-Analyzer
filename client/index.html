<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;500;600;700;800&family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>Rotaract Strength Analyzer | District EOI</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Global API helper — runs outside React module context (works on mobile)
      var __API__ = 'https://rotaract3234strengthanalyser-backend.blackitechs.org/api';

      window.__api = function(method, path, body) {
        var url = __API__ + path;
        var opts = { method: method, headers: {} };
        var token = localStorage.getItem('admin_token');
        if (token) opts.headers['Authorization'] = 'Bearer ' + token;
        if (body && !(body instanceof FormData)) {
          opts.headers['Content-Type'] = 'application/json';
          opts.body = JSON.stringify(body);
        } else if (body) {
          opts.body = body;
        }
        return fetch(url, opts).then(function(res) {
          if (res.status === 401) {
            localStorage.removeItem('admin_token');
            if (window.location.pathname.indexOf('/admin') === 0) window.location.href = '/admin/login';
            return Promise.reject({ response: { status: 401, data: {} } });
          }
          return res;
        });
      };

      // Prefetch form data
      window.__PREFETCH__ = {};
      function pf(name, url) {
        return fetch(__API__ + url).then(function(r) { return r.json(); }).then(function(d) { window.__PREFETCH__[name] = d; }).catch(function() {});
      }
      Promise.all([
        pf('questions', '/application/questions'),
        pf('positions', '/application/positions'),
        pf('clubs', '/application/clubs')
      ]).then(function() { window.__PREFETCH_DONE__ = true; });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
